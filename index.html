<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mschonaker @ microblog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="terminal">
    <div class="scanlines"></div>
    <div class="header">
      <span class="prompt">mschonaker@microblog:~$</span>
      <span class="command">whoami</span>
      <span class="cursor"></span>
    </div>
    <div class="output">Welcome to my microblog. Short thoughts, links, and notes.</div>
    
    <div class="posts-container" id="posts"></div>
    
    <div class="input-area">
      <span class="prompt">mschonaker@microblog:~$</span>
      <input type="text" id="newPost" placeholder="new post..." autocomplete="off">
      <span class="cursor"></span>
    </div>
  </div>
  
  <div class="modal" id="editModal">
    <div class="modal-content">
      <span class="modal-prompt">mschonaker@microblog:~$ edit <span id="editId"></span></span>
      <textarea id="editContent" rows="3"></textarea>
      <div class="modal-buttons">
        <button id="saveEdit">save</button>
        <button id="cancelEdit">cancel</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
