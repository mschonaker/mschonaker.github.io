<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mschonaker @ microblog</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="terminal">
    <div class="header">
      <span class="prompt">~</span>
      <span class="command">mschonaker</span>
      <span class="cursor"></span>
    </div>
    <div class="output">Microblog · Thoughts, notes, and articles</div>
    
    <div class="posts-container" id="posts"></div>
    
    <div class="copyleft">
      <span class="prompt">©</span> copyleft - no rights reserved
    </div>
  </div>
  
  <div class="modal" id="editModal">
    <div class="modal-content">
      <span class="modal-prompt">mschonaker@microblog:~$ edit <span id="editId"></span></span>
      <textarea id="editContent" rows="3"></textarea>
      <div class="modal-buttons">
        <button id="saveEdit">save</button>
        <button id="cancelEdit">cancel</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
